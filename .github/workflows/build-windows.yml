name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  build-windows:
    name: Build Windows x64 EXE
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
      shell: bash
      
    - name: Verify installation
      run: |
        python -c "import pdf2docx; print('pdf2docx OK')"
        python -c "import tkinter; print('tkinter OK')"
      shell: bash
      
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "PDF转Word工具" pdf2docx_gui.py
      shell: bash
      
    - name: Check build output
      run: |
        if [ -f "dist/PDF转Word工具.exe" ]; then
          echo "✅ Build successful!"
          ls -lh dist/
        else
          echo "❌ Build failed!"
          cat build/*.log 2>/dev/null || true
          exit 1
        fi
      shell: bash
      
    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF转Word工具-Windows-x64
        path: dist/PDF转Word工具.exe
        retention-days: 30
        
    - name: Create Release (if tagged)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/PDF转Word工具.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
